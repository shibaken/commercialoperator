{% extends "ledgerui/organisation.html" %}

{% load static %}
{% load django_vite %}
{% block myorganisation_nav %}

<button class="nav-link managed-organisation-nav" id="nav-organisation-tab" data-bs-toggle="tab" data-bs-target="#nav-organisation" type="button" role="tab" aria-controls="nav-organisation" aria-selected="false">Organisations</button>

{% endblock %}

{% block additional_content %}

 
<div id="nav-organisation-tab-page" style="display:none;">
    <div id="app">
        <!-- Display a spinner while waiting for the component to load -->
        <div class="d-flex justify-content-center align-items-center mt-5">
            <div class="spinner-grow text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
        <div class="d-flex justify-content-center align-items-center mb-5">
            <strong>Loading</strong>
        </div>
    </div>
</div>

{% vite_asset vue3_entry_script app='default' %}

{% endblock %}
